# Martin Tile Server Configuration

# Built-in fixture PMTiles source. Published PMTiles are served by the API from
# configured artifact storage, so Martin does not need to watch upload storage.
pmtiles:
  sources:
    stuttgart-base: "/data/stuttgart.pmtiles"
    planisfy.basic: "/data/stuttgart.pmtiles"
    planisfy.basic.v1: "/data/stuttgart.pmtiles"

# Server settings
server:
  # Listen address
  listen_address: "0.0.0.0:3000"

  # CORS settings
  cors:
    allowed_origins: ["*"]

  # Cache control headers
  cache_control_max_age: 604800 # 7 days

# Fixture tile source aliases
# The API proxies public tileset URLs to Martin source names:
#
#   /tiles/v1/{owner}.{tileset}/{z}/{x}/{y}      -> {owner}.{tileset}
#   /tiles/v1/{owner}.{tileset}@{version}/...    -> {owner}.{tileset}.v{version}
#
# Keep these source IDs aligned with the fixture styles. Martin v0.8 exposes
# PMTiles source names directly, so the stable and immutable aliases are mounted
# as first-class sources instead of composer aliases.
