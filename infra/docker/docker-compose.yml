# Planisfy - Self-Hosted Docker Compose Configuration
#
# This configuration runs all Planisfy services locally for development or self-hosting.
#
# Quick start:
#   docker compose up -d
#
# Services:
#   - api:        API Gateway (port 4000)
#   - console:    Customer Console (port 3001)
#   - admin:      Super Admin (port 3003)
#   - docs:       Documentation (port 3002)
#   - marketing:  Landing page (port 3000)
#   - postgres:   PostgreSQL database (port 5432)
#   - redis:      Redis for rate limiting (port 6379)
#   - martin:     Vector tile server (port 3005)
#   - valhalla:   Routing engine (port 3007)
#
# Note: Geocoding (Pelias) runs as a separate project.

services:
  # ============================================
  # Core Applications
  # ============================================

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: planisfy-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - REDIS_URL=redis://redis:6379
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-secret-in-production-min-32-chars}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-this-internal-secret}
      - MARTIN_URL=http://martin:3000
      - GEOCODING_URL=${GEOCODING_URL:-}
      - VALHALLA_URL=http://valhalla:8002
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  console:
    build:
      context: ../../
      dockerfile: apps/console/Dockerfile
    container_name: planisfy-console
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-secret-in-production-min-32-chars}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-this-internal-secret}
      - BETTER_AUTH_URL=http://localhost:3001/api/auth
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  admin:
    build:
      context: ../../
      dockerfile: apps/admin/Dockerfile
    container_name: planisfy-admin
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-secret-in-production-min-32-chars}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-this-internal-secret}
      - BETTER_AUTH_URL=http://localhost:3003/api/auth
      - NEXT_PUBLIC_APP_URL=http://localhost:3003
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  docs:
    build:
      context: ../../
      dockerfile: apps/docs/Dockerfile
    container_name: planisfy-docs
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - planisfy-network

  marketing:
    build:
      context: ../../
      dockerfile: apps/marketing/Dockerfile
    container_name: planisfy-marketing
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - planisfy-network

  # ============================================
  # Data Storage
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: planisfy-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=planisfy
      - POSTGRES_PASSWORD=planisfy
      - POSTGRES_DB=planisfy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U planisfy" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - planisfy-network

  redis:
    image: redis:7-alpine
    container_name: planisfy-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - planisfy-network

  # ============================================
  # Geospatial Engines
  # ============================================

  martin:
    image: maplibre/martin:latest
    container_name: planisfy-martin
    ports:
      - "3005:3000"
    environment:
      - MARTIN_CONFIG=/config/config.yaml
    volumes:
      - ./configs/martin.yaml:/config/config.yaml:ro
      - ./data/pmtiles:/data:ro
    command: [ "--config", "/config/config.yaml" ]
    restart: unless-stopped
    networks:
      - planisfy-network

  valhalla:
    image: ghcr.io/valhalla/valhalla:latest
    container_name: planisfy-valhalla
    ports:
      - "3007:8002"
    environment:
      - RUN_MODES=auto
      - USE_TLS=false
      - BUILD_EGRESS=false
    volumes:
      - ./data/valhalla_data:/custom_files
      - ./configs/valhalla.json:/etc/valhalla/valhalla.json:ro
    command: [ "valhalla_service", "/etc/valhalla/valhalla.json", "1" ]
    restart: unless-stopped
    networks:
      - planisfy-network

  # ============================================
  # Optional: Reverse Proxy (Traefik)
  # ============================================

  traefik:
    image: traefik:v3.0
    container_name: planisfy-traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-config.yml:/etc/traefik/traefik.yml:ro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    restart: unless-stopped
    networks:
      - planisfy-network
    profiles:
      - with-proxy

# ============================================
# Volumes
# ============================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks
# ============================================

networks:
  planisfy-network:
    driver: bridge
