# Planisfy - Self-Hosted Docker Compose Configuration
#
# This configuration runs all Planisfy services locally for development or self-hosting.
#
# Quick start from the repository root:
#   scripts/self-host-setup.sh
#   docker compose --env-file .env -f infra/docker/docker-compose.yml up -d
#
# Services:
#   - api:        API Gateway (port 4000)
#   - tile-worker: Optional isolated PMTiles delivery worker (port 4020)
#   - console:    Customer Console (port 3001)
#   - admin:      Super Admin (port 3003)
#   - docs:       Documentation (port 3002)
#   - marketing:  Landing page (port 3000)
#   - worker:     Geodata processing worker
#   - supervisor: Local-only self-host upgrade supervisor (optional)
#   - postgres:   PostgreSQL database (port 5432)
#   - redis:      Redis for rate limiting (port 6379)
#   - martin:     Vector tile server (port 3005)
#   - valhalla:   Routing engine (port 3007)
#   - elevation:  Local SRTM-backed elevation API (port 4011)
#   - static-renderer: MapLibre PNG renderer for static maps (port 4300)
#   - pelias:     Pelias geocoder API (port 3100)
#
# Note: The bundled Pelias services are for dev smoke coverage with a small
# prepared index. For real imports and larger regions, use the official Pelias
# Docker project and point PELIAS_URL/CONTAINER_PELIAS_URL at it.

name: planisfy

services:
  # ============================================
  # Core Applications
  # ============================================

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    image: planisfy/api:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '4000:4000'
    environment:
      - PORT=4000
      - APP_VERSION=${APP_VERSION:-self-host}
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - GEODATA_STALE_JOB_THRESHOLD_MS=${GEODATA_STALE_JOB_THRESHOLD_MS:-3600000}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-replace-me-github-client-id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-replace-me-github-client-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-replace-me-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-replace-me-google-client-secret}
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CONSOLE_URL=http://localhost:3001
      - NEXT_PUBLIC_AUTH_ORIGIN=http://localhost:3001
      - SOURCE_CREDENTIAL_ENCRYPTION_KEY=${SOURCE_CREDENTIAL_ENCRYPTION_KEY:-}
      - ALLOW_PRIVATE_SOURCE_URLS=${ALLOW_PRIVATE_SOURCE_URLS:-false}
      - OVERTURE_ALLOW_EXPERIMENTAL_TYPES=${OVERTURE_ALLOW_EXPERIMENTAL_TYPES:-false}
      - OVERTURE_RELEASE=${OVERTURE_RELEASE:-}
      - OVERTURE_PARQUET_URL_TEMPLATE=${OVERTURE_PARQUET_URL_TEMPLATE:-s3://overturemaps-us-west-2/release/{release}/theme={theme}/type={type}/*}
      - SOURCE_IMPORT_MAX_FEATURES=${SOURCE_IMPORT_MAX_FEATURES:-50000}
      - SOURCE_IMPORT_TIMEOUT_MS=${SOURCE_IMPORT_TIMEOUT_MS:-900000}
      - DEMO_PMTILES_PATH=${DEMO_PMTILES_PATH:-/data/pmtiles/stuttgart.pmtiles}
      - MARTIN_URL=http://martin:3000
      - TILE_DELIVERY_MODE=${TILE_DELIVERY_MODE:-api}
      - TILE_WORKER_URL=${TILE_WORKER_URL:-http://tile-worker:4020}
      - PELIAS_URL=${CONTAINER_PELIAS_URL:-http://pelias:4000}
      - GLYPHS_URL=${GLYPHS_URL:-http://martin:3000/font}
      - STATIC_MAP_URL=${STATIC_MAP_URL:-http://static-renderer:4300}
      - ELEVATION_URL=${ELEVATION_URL:-http://elevation:8080/api/v1}
      - VALHALLA_URL=http://valhalla:8002
      - VALHALLA_READINESS_ROUTE=${VALHALLA_READINESS_ROUTE:-}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - LOCAL_STORAGE_URL=${LOCAL_STORAGE_URL:-http://localhost:4000/storage}
      - LOCAL_STORAGE_BUCKET=${LOCAL_STORAGE_BUCKET:-planisfy-local}
      - S3_BUCKET=${S3_BUCKET:-planisfy-uploads}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ENDPOINT=${CONTAINER_S3_ENDPOINT:-${S3_ENDPOINT:-}}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - TILE_ALIAS_STORAGE_PREFIX=${TILE_ALIAS_STORAGE_PREFIX:-}
      - MARTIN_SOURCES_PREFIX=${MARTIN_SOURCES_PREFIX:-martin-sources}
      - DODO_PAYMENTS_API_KEY=${DODO_PAYMENTS_API_KEY:-}
      - DODO_PAYMENTS_API_URL=${DODO_PAYMENTS_API_URL:-}
      - DODO_PAYMENTS_ENVIRONMENT=${DODO_PAYMENTS_ENVIRONMENT:-test_mode}
      - DODO_PAYMENTS_WEBHOOK_SECRET=${DODO_PAYMENTS_WEBHOOK_SECRET:-}
      - DODO_STARTER_MONTHLY_PRODUCT_ID=${DODO_STARTER_MONTHLY_PRODUCT_ID:-}
      - DODO_STARTER_YEARLY_PRODUCT_ID=${DODO_STARTER_YEARLY_PRODUCT_ID:-}
      - DODO_SCALE_MONTHLY_PRODUCT_ID=${DODO_SCALE_MONTHLY_PRODUCT_ID:-}
      - DODO_SCALE_YEARLY_PRODUCT_ID=${DODO_SCALE_YEARLY_PRODUCT_ID:-}
      - DODO_PRO_PRODUCT_ID=${DODO_PRO_PRODUCT_ID:-}
      - DODO_ENTERPRISE_PRODUCT_ID=${DODO_ENTERPRISE_PRODUCT_ID:-}
      - ZEPTOMAIL_SEND_MAIL_TOKEN=${ZEPTOMAIL_SEND_MAIL_TOKEN:-}
      - ZEPTOMAIL_FROM_AUTH=${ZEPTOMAIL_FROM_AUTH}
      - ZEPTOMAIL_FROM_NOTIFICATIONS=${ZEPTOMAIL_FROM_NOTIFICATIONS}
      - DEPLOYMENT_MODE=${DEPLOYMENT_MODE:-self_host}
      - NODE_ENV=production
    volumes:
      - ${LOCAL_STORAGE_HOST_PATH:-./data/storage}:/data/storage
      - ./data/pmtiles:/data/pmtiles:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:4000/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pelias:
        condition: service_healthy
      elevation:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  tile-worker:
    build:
      context: ../../
      dockerfile: apps/tile-worker/Dockerfile
    image: planisfy/tile-worker:${PLANISFY_IMAGE_TAG:-dev}
    profiles:
      - with-tile-worker
    ports:
      - '4020:4020'
    environment:
      - PORT=4020
      - HOST=0.0.0.0
      - APP_VERSION=${APP_VERSION:-self-host}
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - LOCAL_STORAGE_URL=${LOCAL_STORAGE_URL:-http://localhost:4000/storage}
      - LOCAL_STORAGE_BUCKET=${LOCAL_STORAGE_BUCKET:-planisfy-local}
      - S3_BUCKET=${S3_BUCKET:-planisfy-uploads}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ENDPOINT=${CONTAINER_S3_ENDPOINT:-${S3_ENDPOINT:-}}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - NODE_ENV=production
    volumes:
      - ${LOCAL_STORAGE_HOST_PATH:-./data/storage}:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:4020/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - planisfy-network

  worker-geodata:
    build:
      context: ../../
      dockerfile: apps/worker-geodata/Dockerfile
    image: planisfy/worker-geodata:${PLANISFY_IMAGE_TAG:-dev}
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      - SOURCE_CREDENTIAL_ENCRYPTION_KEY=${SOURCE_CREDENTIAL_ENCRYPTION_KEY:-}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - LOCAL_STORAGE_URL=${LOCAL_STORAGE_URL:-http://localhost:4000/storage}
      - LOCAL_STORAGE_BUCKET=${LOCAL_STORAGE_BUCKET:-planisfy-local}
      - S3_BUCKET=${S3_BUCKET:-planisfy-uploads}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ENDPOINT=${CONTAINER_S3_ENDPOINT:-${S3_ENDPOINT:-}}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - GEODATA_WORKER_CONCURRENCY=${GEODATA_WORKER_CONCURRENCY:-2}
      - GEODATA_WORKER_HEARTBEAT_INTERVAL_MS=${GEODATA_WORKER_HEARTBEAT_INTERVAL_MS:-10000}
      - GEODATA_WORKER_HEARTBEAT_TTL_MS=${GEODATA_WORKER_HEARTBEAT_TTL_MS:-45000}
      - GEODATA_OUTBOX_POLL_INTERVAL_MS=${GEODATA_OUTBOX_POLL_INTERVAL_MS:-5000}
      - GEODATA_OUTBOX_BATCH_SIZE=${GEODATA_OUTBOX_BATCH_SIZE:-10}
      - GEODATA_STALE_JOB_RECONCILE_INTERVAL_MS=${GEODATA_STALE_JOB_RECONCILE_INTERVAL_MS:-60000}
      - GEODATA_STALE_JOB_THRESHOLD_MS=${GEODATA_STALE_JOB_THRESHOLD_MS:-3600000}
      - DUCKDB_PATH=${DUCKDB_PATH:-duckdb}
      - TIPPECANOE_PATH=${TIPPECANOE_PATH:-tippecanoe}
      - OGR2OGR_PATH=${OGR2OGR_PATH:-ogr2ogr}
      - GEODATA_ALLOW_RAW_FALLBACK=${GEODATA_ALLOW_RAW_FALLBACK:-false}
      - OVERTURE_RELEASE=${OVERTURE_RELEASE:-}
      - OVERTURE_PARQUET_URL_TEMPLATE=${OVERTURE_PARQUET_URL_TEMPLATE:-s3://overturemaps-us-west-2/release/{release}/theme={theme}/type={type}/*}
      - SOURCE_IMPORT_MAX_FEATURES=${SOURCE_IMPORT_MAX_FEATURES:-50000}
      - SOURCE_IMPORT_TIMEOUT_MS=${SOURCE_IMPORT_TIMEOUT_MS:-900000}
      - NODE_ENV=production
    volumes:
      - ${LOCAL_STORAGE_HOST_PATH:-./data/storage}:/data/storage
      - ./data/pmtiles:/data/pmtiles:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  console:
    build:
      context: ../../
      dockerfile: apps/console/Dockerfile
    image: planisfy/console:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '3001:3000'
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      - AUTH_INTERNAL_ORIGIN=http://localhost:3000
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-replace-me-github-client-id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-replace-me-github-client-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-replace-me-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-replace-me-google-client-secret}
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      - NEXT_PUBLIC_AUTH_ORIGIN=http://localhost:3001
      - NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS=${NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS:-}
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - CONSOLE_API_INTERNAL_ORIGIN=http://api:4000
      - NEXT_PUBLIC_ADMIN_URL=http://localhost:3003
      - NEXT_PUBLIC_MARKETING_URL=http://localhost:3000
      - NEXT_PUBLIC_CONSOLE_API_PATH=/api/v1/console
      - ZEPTOMAIL_SEND_MAIL_TOKEN=${ZEPTOMAIL_SEND_MAIL_TOKEN:-}
      - ZEPTOMAIL_FROM_AUTH=${ZEPTOMAIL_FROM_AUTH}
      - ZEPTOMAIL_FROM_NOTIFICATIONS=${ZEPTOMAIL_FROM_NOTIFICATIONS}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  admin:
    build:
      context: ../../
      dockerfile: apps/admin/Dockerfile
    image: planisfy/admin:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '3003:3000'
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-replace-me-github-client-id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-replace-me-github-client-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-replace-me-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-replace-me-google-client-secret}
      - NEXT_PUBLIC_APP_URL=http://localhost:3003
      - NEXT_PUBLIC_AUTH_ORIGIN=http://localhost:3003
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CONSOLE_URL=http://localhost:3001
      - NEXT_PUBLIC_MARKETING_URL=http://localhost:3000
      - SUPERVISOR_URL=${SUPERVISOR_URL:-http://self-host-supervisor:4010}
      - SUPERVISOR_TOKEN=${SUPERVISOR_TOKEN:-}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  self-host-supervisor:
    build:
      context: ../../
      dockerfile: apps/self-host-supervisor/Dockerfile
    image: planisfy/self-host-supervisor:${PLANISFY_IMAGE_TAG:-dev}
    profiles:
      - with-supervisor
    ports:
      - '127.0.0.1:4010:4010'
    environment:
      - PORT=4010
      - HOST=0.0.0.0
      - APP_VERSION=${APP_VERSION:-self-host}
      - PLANISFY_ROOT_DIR=/app
      - SUPERVISOR_STATE_DIR=/data/supervisor
      - SUPERVISOR_COMPOSE_FILE=/app/infra/docker/docker-compose.yml
      - SUPERVISOR_ENV_FILE=/app/.env
      - SUPERVISOR_TOKEN=${SUPERVISOR_TOKEN:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../.env:/app/.env:ro
      - ./data:/app/infra/docker/data
      - ./data/supervisor:/data/supervisor
    restart: unless-stopped
    networks:
      - planisfy-network

  docs:
    build:
      context: ../../
      dockerfile: apps/docs/Dockerfile
    image: planisfy/docs:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '3002:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_AUTH_ORIGIN=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CONSOLE_URL=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  marketing:
    build:
      context: ../../
      dockerfile: apps/marketing/Dockerfile
    image: planisfy/marketing:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-replace-me-github-client-id}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-replace-me-github-client-secret}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-replace-me-google-client-id}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-replace-me-google-client-secret}
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_AUTH_ORIGIN=http://localhost:3000
      - NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS=${NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS:-}
      - NEXT_PUBLIC_CONSOLE_URL=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  # ============================================
  # Data Storage
  # ============================================

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16}
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=planisfy
      - POSTGRES_PASSWORD=planisfy
      - POSTGRES_DB=planisfy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U planisfy']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - planisfy-network

  redis:
    image: ${REDIS_IMAGE:-redis:7.4}
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - planisfy-network

  minio:
    image: ${MINIO_IMAGE:-minio/minio:RELEASE.2025-06-13T11-33-47Z}
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-planisfy}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-planisfy-local-minio-password}
    volumes:
      - ./data/minio:/data
    command: ['server', '/data', '--console-address', ':9001']
    restart: unless-stopped
    networks:
      - planisfy-network
    profiles:
      - with-minio

  minio-init:
    image: ${MINIO_MC_IMAGE:-minio/mc:RELEASE.2025-08-13T08-35-41Z}
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-planisfy}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-planisfy-local-minio-password}
      - S3_BUCKET=${S3_BUCKET:-planisfy-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$S3_BUCKET"
        mc anonymous set download "local/$$S3_BUCKET"
    depends_on:
      - minio
    networks:
      - planisfy-network
    profiles:
      - with-minio

  # ============================================
  # Geospatial Engines
  # ============================================

  martin:
    image: ${MARTIN_IMAGE:-ghcr.io/maplibre/martin:v0.13.0}
    ports:
      - '3005:3000'
    environment:
      - MARTIN_CONFIG=/config/config.yaml
    volumes:
      - ./configs/martin.yaml:/config/config.yaml:ro
      - ./data/pmtiles:/data:ro
      - ./data/fonts:/fonts:ro
    command: ['--config', '/config/config.yaml', '--font', '/fonts']
    restart: unless-stopped
    networks:
      - planisfy-network

  valhalla:
    image: ${VALHALLA_IMAGE:-ghcr.io/valhalla/valhalla:3.7.0}
    ports:
      - '3007:8002'
    environment:
      - RUN_MODES=auto
      - USE_TLS=false
      - BUILD_EGRESS=false
    volumes:
      - ./data/valhalla_data:/custom_files
      - ./configs/valhalla.json:/etc/valhalla/valhalla.json:ro
    command: ['valhalla_service', '/etc/valhalla/valhalla.json', '1']
    restart: unless-stopped
    networks:
      - planisfy-network

  elevation:
    build:
      context: ../../
      dockerfile: apps/elevation/Dockerfile
    image: planisfy/elevation:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '127.0.0.1:4011:8080'
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - ELEVATION_DEM_DIR=/data/elevation
      - NODE_ENV=production
    volumes:
      - ./data/elevation:/data/elevation:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:8080/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped
    networks:
      - planisfy-network

  static-renderer:
    build:
      context: ../../
      dockerfile: apps/static-renderer/Dockerfile
    image: planisfy/static-renderer:${PLANISFY_IMAGE_TAG:-dev}
    ports:
      - '127.0.0.1:4300:4300'
    environment:
      - PORT=4300
      - HOST=0.0.0.0
      - PLANISFY_API_URL=http://api:4000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:4300/health'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped
    networks:
      - planisfy-network

  pelias-elasticsearch:
    image: ${PELIAS_ELASTICSEARCH_IMAGE:-pelias/elasticsearch:7.17.27-2025-01-22-66b2b704398cecb3f0bccede4286a840972c57f8}
    ports:
      - '9200:9200'
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.ml.enabled=false
      - ES_JAVA_OPTS=${PELIAS_ES_JAVA_OPTS:--Xms2g -Xmx2g}
    volumes:
      - pelias_elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "curl -fsS 'http://127.0.0.1:9200/_cluster/health?wait_for_status=yellow&timeout=1s' >/dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 30s
    restart: unless-stopped
    networks:
      - planisfy-network

  pelias:
    image: ${PELIAS_API_IMAGE:-pelias/api:v7.8.0}
    user: root
    ports:
      - '3100:4000'
    environment:
      - PELIAS_CONFIG=/config/pelias.json
      - PORT=4000
    volumes:
      - ./configs/pelias.json:/config/pelias.json:ro
    command:
      [
        'sh',
        '-c',
        "sed -i \"/req.errors.push( _.get(err, 'message', err) );/i\\        if (_.get(err, 'message', err) === 'libpostal service disabled') { return next(); }\" controller/libpostal.js && ./bin/start",
      ]
    depends_on:
      pelias-elasticsearch:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "require(''http'').get(''http://127.0.0.1:4000/v1'', r => process.exit(r.statusCode < 500 ? 0 : 1)).on(''error'', () => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 24
      start_period: 20s
    restart: unless-stopped
    networks:
      - planisfy-network

  pelias-schema:
    image: ${PELIAS_SCHEMA_IMAGE:-pelias/schema:v9.1.0}
    environment:
      - PELIAS_CONFIG=/config/pelias.json
    volumes:
      - ./configs/pelias.json:/config/pelias.json:ro
    command: ['./bin/create_index']
    depends_on:
      pelias-elasticsearch:
        condition: service_healthy
    networks:
      - planisfy-network
    profiles:
      - pelias-fixture

  pelias-csv-importer:
    image: ${PELIAS_CSV_IMPORTER_IMAGE:-pelias/csv-importer:v5.4.0}
    user: root
    environment:
      - PELIAS_CONFIG=/config/pelias.json
    volumes:
      - ./configs/pelias.json:/config/pelias.json:ro
      - ./data/pelias/csv:/data/csv:ro
    command: ['sh', '-c', "sed -i '/adminLookup.create()/d' lib/importPipeline.js && ./bin/start"]
    depends_on:
      pelias-elasticsearch:
        condition: service_healthy
    networks:
      - planisfy-network
    profiles:
      - pelias-fixture

  # ============================================
  # Optional: Reverse Proxy (Traefik)
  # ============================================

  traefik:
    image: ${TRAEFIK_IMAGE:-traefik:v3.7.5}
    ports:
      - '80:80'
      - '443:443'
      - '8080:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-config.yml:/etc/traefik/traefik.yml:ro
    command:
      - '--api.insecure=true'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
    restart: unless-stopped
    networks:
      - planisfy-network
    profiles:
      - with-proxy

# ============================================
# Volumes
# ============================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pelias_elasticsearch_data:
    driver: local

# ============================================
# Networks
# ============================================

networks:
  planisfy-network:
    driver: bridge
