# Planisfy - Self-Hosted Docker Compose Configuration
#
# This configuration runs all Planisfy services locally for development or self-hosting.
#
# Quick start from the repository root:
#   scripts/self-host-setup.sh
#   docker compose --env-file .env -f infra/docker/docker-compose.yml up -d
#
# Services:
#   - api:        API Gateway (port 4000)
#   - console:    Customer Console (port 3001)
#   - admin:      Super Admin (port 3003)
#   - docs:       Documentation (port 3002)
#   - marketing:  Landing page (port 3000)
#   - worker:     Geodata processing worker
#   - postgres:   PostgreSQL database (port 5432)
#   - redis:      Redis for rate limiting (port 6379)
#   - martin:     Vector tile server (port 3005)
#   - valhalla:   Routing engine (port 3007)
#
# Note: Geocoding (Pelias) runs as a separate project.

services:
  # ============================================
  # Core Applications
  # ============================================

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: planisfy-api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - APP_VERSION=${APP_VERSION:-self-host}
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-secret-in-production-min-32-chars}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-this-internal-secret}
      - INTERNAL_API_URL=http://api:4000
      - SOURCE_CREDENTIAL_ENCRYPTION_KEY=${SOURCE_CREDENTIAL_ENCRYPTION_KEY:-}
      - ALLOW_PRIVATE_SOURCE_URLS=${ALLOW_PRIVATE_SOURCE_URLS:-false}
      - OVERTURE_ALLOW_EXPERIMENTAL_TYPES=${OVERTURE_ALLOW_EXPERIMENTAL_TYPES:-false}
      - CONSOLE_URL=http://localhost:3001
      - MARTIN_URL=http://martin:3000
      - PELIAS_URL=${PELIAS_URL:-http://api:4000/geocoding}
      - GLYPHS_URL=${GLYPHS_URL:-https://demotiles.maplibre.org/font}
      - ELEVATION_URL=${ELEVATION_URL:-https://api.open-elevation.com/api/v1}
      - VALHALLA_URL=http://valhalla:8002
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - LOCAL_STORAGE_URL=${LOCAL_STORAGE_URL:-http://localhost:4000/storage}
      - LOCAL_STORAGE_BUCKET=${LOCAL_STORAGE_BUCKET:-planisfy-local}
      - S3_BUCKET=${S3_BUCKET:-planisfy-uploads}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - MARTIN_SOURCES_PREFIX=${MARTIN_SOURCES_PREFIX:-martin-sources}
      - DODO_PAYMENTS_API_KEY=${DODO_PAYMENTS_API_KEY:-}
      - DODO_PAYMENTS_API_URL=${DODO_PAYMENTS_API_URL:-}
      - DODO_PAYMENTS_ENVIRONMENT=${DODO_PAYMENTS_ENVIRONMENT:-test_mode}
      - DODO_PAYMENTS_WEBHOOK_SECRET=${DODO_PAYMENTS_WEBHOOK_SECRET:-}
      - DODO_PRO_PRODUCT_ID=${DODO_PRO_PRODUCT_ID:-}
      - DODO_ENTERPRISE_PRODUCT_ID=${DODO_ENTERPRISE_PRODUCT_ID:-}
      - NODE_ENV=production
    volumes:
      - ./data/storage:/data/storage
    healthcheck:
      test: [ "CMD-SHELL", "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  worker-geodata:
    build:
      context: ../../
      dockerfile: apps/worker-geodata/Dockerfile
    container_name: planisfy-worker-geodata
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - REDIS_URL=redis://redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - LOCAL_STORAGE_PATH=/data/storage
      - LOCAL_STORAGE_URL=${LOCAL_STORAGE_URL:-http://localhost:4000/storage}
      - LOCAL_STORAGE_BUCKET=${LOCAL_STORAGE_BUCKET:-planisfy-local}
      - S3_BUCKET=${S3_BUCKET:-planisfy-uploads}
      - S3_REGION=${S3_REGION:-auto}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_PUBLIC_URL=${S3_PUBLIC_URL:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:-}
      - R2_BUCKET=${R2_BUCKET:-}
      - R2_ENDPOINT=${R2_ENDPOINT:-}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:-}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:-}
      - GEODATA_WORKER_CONCURRENCY=${GEODATA_WORKER_CONCURRENCY:-2}
      - DUCKDB_PATH=${DUCKDB_PATH:-duckdb}
      - TIPPECANOE_PATH=${TIPPECANOE_PATH:-tippecanoe}
      - OGR2OGR_PATH=${OGR2OGR_PATH:-ogr2ogr}
      - GEODATA_ALLOW_RAW_FALLBACK=${GEODATA_ALLOW_RAW_FALLBACK:-false}
      - OVERTURE_RELEASE=${OVERTURE_RELEASE:-}
      - OVERTURE_PARQUET_URL_TEMPLATE=${OVERTURE_PARQUET_URL_TEMPLATE:-s3://overturemaps-us-west-2/release/{release}/theme={theme}/type={type}/*}
      - SOURCE_IMPORT_MAX_FEATURES=${SOURCE_IMPORT_MAX_FEATURES:-50000}
      - SOURCE_IMPORT_TIMEOUT_MS=${SOURCE_IMPORT_TIMEOUT_MS:-900000}
      - NODE_ENV=production
    volumes:
      - ./data/storage:/data/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  console:
    build:
      context: ../../
      dockerfile: apps/console/Dockerfile
    container_name: planisfy-console
    ports:
      - "3001:3000"
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-secret-in-production-min-32-chars}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-this-internal-secret}
      - BETTER_AUTH_URL=http://localhost:3001/api/auth
      - API_URL=http://api:4000
      - NEXT_PUBLIC_APP_URL=http://localhost:3001
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_ADMIN_URL=http://localhost:3003
      - NEXT_PUBLIC_MARKETING_URL=http://localhost:3000
      - NEXT_PUBLIC_CONSOLE_API_PATH=/api/v1/console
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  admin:
    build:
      context: ../../
      dockerfile: apps/admin/Dockerfile
    container_name: planisfy-admin
    ports:
      - "3003:3000"
    environment:
      - DATABASE_URL=postgresql://planisfy:planisfy@postgres:5432/planisfy
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-this-secret-in-production-min-32-chars}
      - INTERNAL_API_SECRET=${INTERNAL_API_SECRET:-change-this-internal-secret}
      - BETTER_AUTH_URL=http://localhost:3003/api/auth
      - API_URL=http://api:4000
      - NEXT_PUBLIC_APP_URL=http://localhost:3003
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - NEXT_PUBLIC_CONSOLE_URL=http://localhost:3001
      - NEXT_PUBLIC_MARKETING_URL=http://localhost:3000
      - NODE_ENV=production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - planisfy-network

  docs:
    build:
      context: ../../
      dockerfile: apps/docs/Dockerfile
    container_name: planisfy-docs
    ports:
      - "3002:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - planisfy-network

  marketing:
    build:
      context: ../../
      dockerfile: apps/marketing/Dockerfile
    container_name: planisfy-marketing
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - planisfy-network

  # ============================================
  # Data Storage
  # ============================================

  postgres:
    image: postgres:16-alpine
    container_name: planisfy-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=planisfy
      - POSTGRES_PASSWORD=planisfy
      - POSTGRES_DB=planisfy
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U planisfy" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - planisfy-network

  redis:
    image: redis:7-alpine
    container_name: planisfy-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - planisfy-network

  minio:
    image: minio/minio:latest
    container_name: planisfy-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-planisfy}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-planisfy-local-minio-password}
    volumes:
      - ./data/minio:/data
    command: [ "server", "/data", "--console-address", ":9001" ]
    restart: unless-stopped
    networks:
      - planisfy-network
    profiles:
      - with-minio

  minio-init:
    image: minio/mc:latest
    container_name: planisfy-minio-init
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-planisfy}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-planisfy-local-minio-password}
      - S3_BUCKET=${S3_BUCKET:-planisfy-artifacts}
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do
          sleep 2
        done
        mc mb --ignore-existing "local/$$S3_BUCKET"
        mc anonymous set download "local/$$S3_BUCKET"
    depends_on:
      - minio
    networks:
      - planisfy-network
    profiles:
      - with-minio

  # ============================================
  # Geospatial Engines
  # ============================================

  martin:
    image: maplibre/martin:latest
    container_name: planisfy-martin
    ports:
      - "3005:3000"
    environment:
      - MARTIN_CONFIG=/config/config.yaml
    volumes:
      - ./configs/martin.yaml:/config/config.yaml:ro
      - ./data/pmtiles:/data:ro
      - ./data/storage:/storage:ro
    command: [ "--config", "/config/config.yaml" ]
    restart: unless-stopped
    networks:
      - planisfy-network

  valhalla:
    image: ghcr.io/valhalla/valhalla:latest
    container_name: planisfy-valhalla
    ports:
      - "3007:8002"
    environment:
      - RUN_MODES=auto
      - USE_TLS=false
      - BUILD_EGRESS=false
    volumes:
      - ./data/valhalla_data:/custom_files
      - ./configs/valhalla.json:/etc/valhalla/valhalla.json:ro
    command: [ "valhalla_service", "/etc/valhalla/valhalla.json", "1" ]
    restart: unless-stopped
    networks:
      - planisfy-network

  # ============================================
  # Optional: Reverse Proxy (Traefik)
  # ============================================

  traefik:
    image: traefik:v3.0
    container_name: planisfy-traefik
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik-config.yml:/etc/traefik/traefik.yml:ro
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    restart: unless-stopped
    networks:
      - planisfy-network
    profiles:
      - with-proxy

# ============================================
# Volumes
# ============================================

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks
# ============================================

networks:
  planisfy-network:
    driver: bridge
