name: planisfy

x-api-env: &api-env
  APP_VERSION: ${APP_VERSION:-dokploy-main}
  NODE_ENV: production
  DEPLOYMENT_MODE: managed
  PORT: 4000
  DATABASE_URL: postgresql://planisfy:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/planisfy
  REDIS_URL: redis://redis:6379
  REDIS_HOST: redis
  REDIS_PORT: 6379
  BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
  INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
  NEXT_PUBLIC_API_URL: https://api.planisfy.com
  NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
  NEXT_PUBLIC_AUTH_ORIGIN: https://console.planisfy.com
  STORAGE_PROVIDER: r2
  LOCAL_STORAGE_PATH: /data/storage
  LOCAL_STORAGE_BUCKET: planisfy-local
  LOCAL_STORAGE_URL: https://api.planisfy.com/storage
  S3_BUCKET: ${S3_BUCKET:-}
  S3_REGION: ${S3_REGION:-auto}
  S3_ENDPOINT: ${S3_ENDPOINT:-}
  S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
  R2_BUCKET: ${R2_BUCKET:?R2_BUCKET must be set}
  R2_ENDPOINT: ${R2_ENDPOINT:-}
  R2_PUBLIC_URL: ${R2_PUBLIC_URL:?R2_PUBLIC_URL must be set}
  R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID must be set}
  R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY must be set}
  DODO_PAYMENTS_API_KEY: ${DODO_PAYMENTS_API_KEY:?DODO_PAYMENTS_API_KEY must be set}
  DODO_PAYMENTS_API_URL: ${DODO_PAYMENTS_API_URL:-}
  DODO_PAYMENTS_ENVIRONMENT: ${DODO_PAYMENTS_ENVIRONMENT:-test_mode}
  DODO_PAYMENTS_WEBHOOK_SECRET: ${DODO_PAYMENTS_WEBHOOK_SECRET:?DODO_PAYMENTS_WEBHOOK_SECRET must be set}
  DODO_PAYMENTS_BRAND_ID: ${DODO_PAYMENTS_BRAND_ID:?DODO_PAYMENTS_BRAND_ID must be set}
  DODO_STARTER_MONTHLY_PRODUCT_ID: ${DODO_STARTER_MONTHLY_PRODUCT_ID:-}
  DODO_STARTER_YEARLY_PRODUCT_ID: ${DODO_STARTER_YEARLY_PRODUCT_ID:-}
  DODO_SCALE_MONTHLY_PRODUCT_ID: ${DODO_SCALE_MONTHLY_PRODUCT_ID:-}
  DODO_SCALE_YEARLY_PRODUCT_ID: ${DODO_SCALE_YEARLY_PRODUCT_ID:-}
  DODO_PRO_PRODUCT_ID: ${DODO_PRO_PRODUCT_ID:-}
  DODO_ENTERPRISE_PRODUCT_ID: ${DODO_ENTERPRISE_PRODUCT_ID:-}
  RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY must be set}
  FROM_EMAIL: ${FROM_EMAIL:-Planisfy <noreply@planisfy.com>}
  SOURCE_CREDENTIAL_ENCRYPTION_KEY: ${SOURCE_CREDENTIAL_ENCRYPTION_KEY:-}
  ALLOW_PRIVATE_SOURCE_URLS: ${ALLOW_PRIVATE_SOURCE_URLS:-false}
  OVERTURE_ALLOW_EXPERIMENTAL_TYPES: ${OVERTURE_ALLOW_EXPERIMENTAL_TYPES:-false}
  OVERTURE_RELEASE: ${OVERTURE_RELEASE:-}
  OVERTURE_PARQUET_URL_TEMPLATE: ${OVERTURE_PARQUET_URL_TEMPLATE:-s3://overturemaps-us-west-2/release/{release}/theme={theme}/type={type}/*}
  SOURCE_IMPORT_MAX_FEATURES: ${SOURCE_IMPORT_MAX_FEATURES:-50000}
  SOURCE_IMPORT_TIMEOUT_MS: ${SOURCE_IMPORT_TIMEOUT_MS:-900000}
  DEMO_PMTILES_PATH: ${DEMO_PMTILES_PATH:-}
  TILE_DELIVERY_MODE: api
  TILE_WORKER_URL: ""
  MARTIN_URL: http://127.0.0.1:3005
  VALHALLA_URL: http://127.0.0.1:3007
  PELIAS_URL: http://127.0.0.1:3100
  GLYPHS_URL: https://api.planisfy.com/fonts
  STATIC_MAP_URL: http://static-renderer:4300
  ELEVATION_URL: http://elevation:8080/api/v1
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-replace-me-github-client-id}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-replace-me-github-client-secret}
  GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-replace-me-google-client-id}
  GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-replace-me-google-client-secret}

x-traefik-websecure: &traefik-websecure
  traefik.enable: "true"
  traefik.docker.network: dokploy-network

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: planisfy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: planisfy
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planisfy -d planisfy"]
      interval: 5s
      timeout: 5s
      retries: 12
    networks:
      - planisfy-internal

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - planisfy-internal

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    labels:
      <<: *traefik-websecure
      traefik.http.routers.planisfy-api-web.rule: Host(`api.planisfy.com`)
      traefik.http.routers.planisfy-api-web.entrypoints: web
      traefik.http.routers.planisfy-api-web.middlewares: redirect-to-https@file
      traefik.http.routers.planisfy-api.rule: Host(`api.planisfy.com`)
      traefik.http.routers.planisfy-api.entrypoints: websecure
      traefik.http.routers.planisfy-api.tls.certresolver: letsencrypt
      traefik.http.services.planisfy-api.loadbalancer.server.port: 4000
    networks:
      - planisfy-internal
      - dokploy-network

  worker-geodata:
    build:
      context: .
      dockerfile: apps/worker-geodata/Dockerfile
    restart: unless-stopped
    environment:
      <<: *api-env
      GEODATA_WORKER_CONCURRENCY: ${GEODATA_WORKER_CONCURRENCY:-2}
      GEODATA_WORKER_HEARTBEAT_INTERVAL_MS: ${GEODATA_WORKER_HEARTBEAT_INTERVAL_MS:-10000}
      GEODATA_WORKER_HEARTBEAT_TTL_MS: ${GEODATA_WORKER_HEARTBEAT_TTL_MS:-45000}
      GEODATA_OUTBOX_POLL_INTERVAL_MS: ${GEODATA_OUTBOX_POLL_INTERVAL_MS:-5000}
      GEODATA_OUTBOX_BATCH_SIZE: ${GEODATA_OUTBOX_BATCH_SIZE:-10}
      GEODATA_STALE_JOB_RECONCILE_INTERVAL_MS: ${GEODATA_STALE_JOB_RECONCILE_INTERVAL_MS:-60000}
      GEODATA_STALE_JOB_THRESHOLD_MS: ${GEODATA_STALE_JOB_THRESHOLD_MS:-3600000}
      DUCKDB_PATH: ${DUCKDB_PATH:-duckdb}
      TIPPECANOE_PATH: ${TIPPECANOE_PATH:-tippecanoe}
      OGR2OGR_PATH: ${OGR2OGR_PATH:-ogr2ogr}
      GEODATA_ALLOW_RAW_FALLBACK: ${GEODATA_ALLOW_RAW_FALLBACK:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - planisfy-internal

  console:
    build:
      context: .
      dockerfile: apps/console/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.planisfy.com
        CONSOLE_API_INTERNAL_ORIGIN: http://api:4000
        NEXT_PUBLIC_AUTH_ORIGIN: https://console.planisfy.com
        NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS: ${NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS:-}
        NEXT_PUBLIC_APP_URL: https://console.planisfy.com
        NEXT_PUBLIC_ADMIN_URL: https://admin.planisfy.com
        NEXT_PUBLIC_MARKETING_URL: https://planisfy.com
        NEXT_PUBLIC_CONSOLE_API_PATH: /api/v1/console
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://planisfy:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/planisfy
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      NEXT_PUBLIC_API_URL: https://api.planisfy.com
      CONSOLE_API_INTERNAL_ORIGIN: http://api:4000
      NEXT_PUBLIC_AUTH_ORIGIN: https://console.planisfy.com
      NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS: ${NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS:-}
      NEXT_PUBLIC_APP_URL: https://console.planisfy.com
      NEXT_PUBLIC_ADMIN_URL: https://admin.planisfy.com
      NEXT_PUBLIC_MARKETING_URL: https://planisfy.com
      NEXT_PUBLIC_CONSOLE_API_PATH: /api/v1/console
      RESEND_API_KEY: ${RESEND_API_KEY:?RESEND_API_KEY must be set}
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    labels:
      <<: *traefik-websecure
      traefik.http.routers.planisfy-console-web.rule: Host(`console.planisfy.com`)
      traefik.http.routers.planisfy-console-web.entrypoints: web
      traefik.http.routers.planisfy-console-web.middlewares: redirect-to-https@file
      traefik.http.routers.planisfy-console.rule: Host(`console.planisfy.com`)
      traefik.http.routers.planisfy-console.entrypoints: websecure
      traefik.http.routers.planisfy-console.tls.certresolver: letsencrypt
      traefik.http.services.planisfy-console.loadbalancer.server.port: 3000
    networks:
      - planisfy-internal
      - dokploy-network

  marketing:
    build:
      context: .
      dockerfile: apps/marketing/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.planisfy.com
        NEXT_PUBLIC_AUTH_ORIGIN: https://planisfy.com
        NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS: ${NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS:-}
        NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://planisfy:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/planisfy
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      NEXT_PUBLIC_API_URL: https://api.planisfy.com
      NEXT_PUBLIC_AUTH_ORIGIN: https://planisfy.com
      NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS: ${NEXT_PUBLIC_AUTH_SOCIAL_PROVIDERS:-}
      NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      <<: *traefik-websecure
      traefik.http.routers.planisfy-marketing-web.rule: Host(`planisfy.com`) || Host(`www.planisfy.com`)
      traefik.http.routers.planisfy-marketing-web.entrypoints: web
      traefik.http.routers.planisfy-marketing-web.middlewares: redirect-to-https@file
      traefik.http.routers.planisfy-marketing.rule: Host(`planisfy.com`) || Host(`www.planisfy.com`)
      traefik.http.routers.planisfy-marketing.entrypoints: websecure
      traefik.http.routers.planisfy-marketing.tls.certresolver: letsencrypt
      traefik.http.services.planisfy-marketing.loadbalancer.server.port: 3000
    networks:
      - planisfy-internal
      - dokploy-network

  docs:
    build:
      context: .
      dockerfile: apps/docs/Dockerfile
      args:
        NEXT_PUBLIC_AUTH_ORIGIN: https://docs.planisfy.com
        NEXT_PUBLIC_API_URL: https://api.planisfy.com
        NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://planisfy:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/planisfy
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      NEXT_PUBLIC_AUTH_ORIGIN: https://docs.planisfy.com
      NEXT_PUBLIC_API_URL: https://api.planisfy.com
      NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      <<: *traefik-websecure
      traefik.http.routers.planisfy-docs-web.rule: Host(`docs.planisfy.com`)
      traefik.http.routers.planisfy-docs-web.entrypoints: web
      traefik.http.routers.planisfy-docs-web.middlewares: redirect-to-https@file
      traefik.http.routers.planisfy-docs.rule: Host(`docs.planisfy.com`)
      traefik.http.routers.planisfy-docs.entrypoints: websecure
      traefik.http.routers.planisfy-docs.tls.certresolver: letsencrypt
      traefik.http.services.planisfy-docs.loadbalancer.server.port: 3000
    networks:
      - planisfy-internal
      - dokploy-network

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.planisfy.com
        NEXT_PUBLIC_AUTH_ORIGIN: https://admin.planisfy.com
        NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
        NEXT_PUBLIC_MARKETING_URL: https://planisfy.com
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://planisfy:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/planisfy
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET:?INTERNAL_API_SECRET must be set}
      NEXT_PUBLIC_APP_URL: https://admin.planisfy.com
      NEXT_PUBLIC_AUTH_ORIGIN: https://admin.planisfy.com
      NEXT_PUBLIC_API_URL: https://api.planisfy.com
      NEXT_PUBLIC_CONSOLE_URL: https://console.planisfy.com
      NEXT_PUBLIC_MARKETING_URL: https://planisfy.com
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      <<: *traefik-websecure
      traefik.http.routers.planisfy-admin-web.rule: Host(`admin.planisfy.com`)
      traefik.http.routers.planisfy-admin-web.entrypoints: web
      traefik.http.routers.planisfy-admin-web.middlewares: redirect-to-https@file
      traefik.http.routers.planisfy-admin.rule: Host(`admin.planisfy.com`)
      traefik.http.routers.planisfy-admin.entrypoints: websecure
      traefik.http.routers.planisfy-admin.tls.certresolver: letsencrypt
      traefik.http.services.planisfy-admin.loadbalancer.server.port: 3000
    networks:
      - planisfy-internal
      - dokploy-network

  elevation:
    build:
      context: .
      dockerfile: apps/elevation/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 8080
      HOST: 0.0.0.0
      ELEVATION_DEM_DIR: /data/elevation
      NODE_ENV: production
    networks:
      - planisfy-internal

  static-renderer:
    build:
      context: .
      dockerfile: apps/static-renderer/Dockerfile
    restart: unless-stopped
    environment:
      PORT: 4300
      HOST: 0.0.0.0
      PLANISFY_API_URL: http://api:4000
      NODE_ENV: production
    depends_on:
      api:
        condition: service_healthy
    networks:
      - planisfy-internal

volumes:
  postgres-data:
    external: true
    name: deploy_postgres-data
  redis-data:
    external: true
    name: deploy_redis-data

networks:
  planisfy-internal:
    driver: bridge
  dokploy-network:
    external: true
