# Martin Tile Server Configuration

# Storage backends for PMTiles
pmtiles:
  # Path to PMTiles directory
  sources:
    # Overture Maps - Base Layer
    - id: "overture-base"
      path: "/data/overture-base.pmtiles"

    # Overture Maps - Places
    - id: "overture-places"
      path: "/data/overture-places.pmtiles"

# Sprite sources
sprites:
  - id: "planisfy-sprites"
    path: "/data/sprites"

# Font sources
fonts:
  - id: "planisfy-fonts"
    path: "/data/fonts"

# Server settings
server:
  # Listen address
  listen_address: "0.0.0.0:3000"

  # CORS settings
  cors:
    allowed_origins: ["*"]

  # Cache control headers
  cache_control_max_age: 604800  # 7 days

# Tile source combination
# Combine multiple sources into a single tileset
composer:
  - id: "planisfy.basic"
    sources: ["overture-base"]

  - id: "planisfy.places"
    sources: ["overture-base", "overture-places"]
